<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pulse — Social</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- AUTH SCREEN -->
    <div id="auth-screen" class="screen active">
      <div class="auth-bg">
        <div class="auth-blob blob-1"></div>
        <div class="auth-blob blob-2"></div>
        <div class="auth-blob blob-3"></div>
      </div>
      <div class="auth-container">
        <div class="auth-brand">
          <span class="brand-dot"></span>
          <h1 class="brand-name">Pulse</h1>
          <p class="brand-tagline">Where moments breathe.</p>
        </div>

        <div class="auth-card">
          <div class="auth-tabs">
            <button class="auth-tab active" data-tab="login">Sign in</button>
            <button class="auth-tab" data-tab="register">Create account</button>
          </div>

          <!-- Login Form -->
          <form id="login-form" class="auth-form active">
            <div class="field-group">
              <label>Email</label>
              <input
                type="email"
                id="login-email"
                placeholder="you@example.com"
                required
              />
            </div>
            <div class="field-group">
              <label>Password</label>
              <input
                type="password"
                id="login-password"
                placeholder="••••••••"
                required
              />
            </div>
            <div id="login-error" class="auth-error hidden"></div>
            <button type="submit" class="btn-primary full-width">
              Sign in
            </button>
          </form>

          <!-- Register Form -->
          <form id="register-form" class="auth-form">
            <div class="field-row">
              <div class="field-group">
                <label>Username</label>
                <input
                  type="text"
                  id="reg-username"
                  placeholder="yourhandle"
                  required
                />
              </div>
              <div class="field-group">
                <label>Display Name</label>
                <input
                  type="text"
                  id="reg-displayname"
                  placeholder="Your Name"
                />
              </div>
            </div>
            <div class="field-group">
              <label>Email</label>
              <input
                type="email"
                id="reg-email"
                placeholder="you@example.com"
                required
              />
            </div>
            <div class="field-group">
              <label>Password</label>
              <input
                type="password"
                id="reg-password"
                placeholder="Min. 6 characters"
                required
              />
            </div>
            <div id="register-error" class="auth-error hidden"></div>
            <button type="submit" class="btn-primary full-width">
              Create account
            </button>
          </form>
        </div>
      </div>
    </div>

    <!-- MAIN APP -->
    <div id="app-screen" class="screen">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-brand">
          <span class="brand-dot sm"></span>
          <span class="brand-name sm">Pulse</span>
        </div>

        <nav class="sidebar-nav">
          <button class="nav-item active" data-view="feed">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
            >
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
              <polyline points="9,22 9,12 15,12 15,22" />
            </svg>
            <span>Home</span>
          </button>
          <button class="nav-item" data-view="explore">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
            >
              <circle cx="11" cy="11" r="8" />
              <line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
            <span>Explore</span>
          </button>
          <button class="nav-item" data-view="profile">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
            >
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
              <circle cx="12" cy="7" r="4" />
            </svg>
            <span>Profile</span>
          </button>
        </nav>

        <div class="sidebar-user" id="sidebar-user">
          <div class="user-avatar" id="sidebar-avatar"></div>
          <div class="user-meta">
            <span class="user-dname" id="sidebar-displayname"></span>
            <span class="user-handle" id="sidebar-username"></span>
          </div>
          <button class="btn-logout" id="logout-btn" title="Sign out">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
            >
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
              <polyline points="16,17 21,12 16,7" />
              <line x1="21" y1="12" x2="9" y2="12" />
            </svg>
          </button>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="main-content">
        <!-- Feed View -->
        <div id="view-feed" class="view active">
          <div class="view-header">
            <h2>Home</h2>
            <p class="view-subtitle">Your personalized feed</p>
          </div>

          <!-- Compose -->
          <div class="compose-card">
            <div class="compose-avatar" id="compose-avatar"></div>
            <div class="compose-body">
              <textarea
                id="compose-text"
                placeholder="What's on your mind?"
                rows="3"
                maxlength="1000"
              ></textarea>
              <div class="compose-footer">
                <span class="char-count" id="char-count">0 / 1000</span>
                <button class="btn-primary" id="post-btn">Post</button>
              </div>
            </div>
          </div>

          <div id="feed-posts" class="posts-container">
            <div class="loading-state">Loading your feed...</div>
          </div>
        </div>

        <!-- Explore View -->
        <div id="view-explore" class="view">
          <div class="view-header">
            <h2>Explore</h2>
            <p class="view-subtitle">Discover new voices</p>
          </div>

          <div class="search-bar">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
            >
              <circle cx="11" cy="11" r="8" />
              <line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
            <input
              type="text"
              id="search-input"
              placeholder="Search people..."
            />
          </div>

          <div id="search-results" class="users-list hidden"></div>

          <div id="explore-posts" class="posts-container">
            <div class="loading-state">Loading posts...</div>
          </div>
        </div>

        <!-- Profile View -->
        <div id="view-profile" class="view">
          <div id="profile-content">
            <div class="loading-state">Loading profile...</div>
          </div>
        </div>
      </main>

      <!-- Right Panel -->
      <aside class="right-panel">
        <div class="panel-section">
          <h3>Who to follow</h3>
          <div id="suggestions-list" class="suggestions">
            <div class="loading-state sm">Finding people...</div>
          </div>
        </div>
      </aside>
    </div>

    <!-- MODALS -->

    <!-- Post Detail Modal -->
    <div id="post-modal" class="modal-overlay hidden">
      <div class="modal-box">
        <button class="modal-close" id="close-post-modal">✕</button>
        <div id="post-modal-content"></div>
      </div>
    </div>

    <!-- Edit Profile Modal -->
    <div id="edit-profile-modal" class="modal-overlay hidden">
      <div class="modal-box">
        <button class="modal-close" id="close-edit-modal">✕</button>
        <h3 class="modal-title">Edit Profile</h3>
        <form id="edit-profile-form">
          <div class="field-group">
            <label>Display Name</label>
            <input type="text" id="edit-displayname" maxlength="50" />
          </div>
          <div class="field-group">
            <label>Bio</label>
            <textarea
              id="edit-bio"
              rows="3"
              maxlength="160"
              placeholder="Tell people about yourself..."
            ></textarea>
          </div>
          <div class="field-group">
            <label>Avatar URL</label>
            <input type="url" id="edit-avatar" placeholder="https://..." />
          </div>
          <div id="edit-error" class="auth-error hidden"></div>
          <button type="submit" class="btn-primary full-width">
            Save changes
          </button>
        </form>
      </div>
    </div>

    <script src="js/app.js"></script>
  </body>
</html>
